<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — remateTaller</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="interno/design-system.css">
<style>
.prod-foto { width:84px; height:84px; object-fit:cover; border-radius:8px; flex:none; }
.stepper { display:flex; align-items:center; gap:10px; }
.stepper button { width:40px; height:40px; border-radius:50%; border:1px solid var(--c-borde);
  background:var(--c-superficie); font-size:20px; font-weight:700; color:var(--c-primario); }
.stepper span { min-width:34px; text-align:center; font-weight:700; font-size:18px; }
.barra-total { position:fixed; bottom:0; left:0; right:0; background:var(--c-superficie);
  border-top:1px solid var(--c-borde); box-shadow:0 -2px 8px rgba(0,0,0,0.08); padding:10px 16px; z-index:200; }
.barra-total .fila { align-items:center; }
main { padding-bottom:150px; }
.opcion-lote { background:var(--c-primario-claro); border-radius:8px; padding:10px; margin-top:10px; }
</style>
</head>
<body>

<header id="topbar">
  <div class="brand"><span class="material-icons">gavel</span><span>remateTaller</span></div>
</header>

<main>
  <div id="vistaCargando" class="centrado"><p class="texto-suave">Cargando tu catálogo…</p></div>

  <!-- Pedido ya validado -->
  <div id="vistaValidado" style="display:none;">
    <h1>¡Compra confirmada! ✅</h1>
    <div class="card">
      <p>Tu pedido ya fue confirmado por el vendedor. Los detalles de la entrega se coordinan por WhatsApp.</p>
    </div>
  </div>

  <!-- Catálogo -->
  <div id="vistaCatalogo" style="display:none;">
    <h1 id="saludo">Hola 👋</h1>
    <p class="texto-suave" id="infoAcceso"></p>
    <div class="fila" style="margin-bottom:10px;">
      <select id="filtroCat"><option value="">Todas las categorías</option></select>
      <input type="text" id="filtroTexto" placeholder="Buscar…">
    </div>
    <div id="listaProductos"></div>
  </div>
</main>

<!-- Barra de total -->
<div class="barra-total" id="barraTotal" style="display:none;">
  <div class="fila" style="justify-content:space-between;">
    <div>
      <strong id="txtTotales">—</strong><br>
      <span class="texto-suave" id="txtItems" style="font-size:12px;"></span>
    </div>
    <button class="btn" id="btnEnviar" style="margin-top:0; width:auto; flex:none;">
      <span class="material-icons">send</span> Enviar pedido
    </button>
  </div>
  <p class="texto-suave centrado" id="txtEstadoPedido" style="font-size:12px; margin:6px 0 0;"></p>
</div>

<script type="module">
import {
  validarLlave, db, fmtFecha, fmtMoneda, toast,
  doc, getDoc, setDoc, collection, getDocs, serverTimestamp
} from "./interno/utils.js";

const params = new URLSearchParams(window.location.search);
const codigo = (params.get("llave") || "").trim().toUpperCase();
const pedidoId = "ped-" + codigo;

let llave = null;
let cats = [];
let productos = [];
let carrito = {};      // productoId → { cantidad, esLote, propuesta }
let estadoPedido = "abierto";
let guardadoTimer = null;

// Productos viejos solo tienen `descripcion`; se usa como nombre.
function nombreDe(p) { return p.nombre || p.descripcion || "—"; }

(async () => {
  const r = await validarLlave(codigo);
  if (!r.ok) {
    window.location.href = "./" + (codigo ? "?llave=" + encodeURIComponent(codigo) : "");
    return;
  }
  llave = r.datos;

  // Pedido existente (si hay)
  try {
    const ps = await getDoc(doc(db, "pedidos", pedidoId));
    if (ps.exists()) {
      const p = ps.data();
      estadoPedido = p.estado || "abierto";
      if (estadoPedido === "validado") { mostrar("vistaValidado"); return; }
      (p.items || []).forEach((it) => {
        carrito[it.productoId] = {
          cantidad: it.cantidad || 0,
          esLote: !!it.esLote,
          propuesta: it.propuestaLote || ""
        };
      });
    }
  } catch (e) { console.error(e); }

  await cargarCatalogo();
  document.getElementById("saludo").textContent = "Hola, " + (llave.nombre || "") + " 👋";
  document.getElementById("infoAcceso").textContent =
    "Tu acceso vence el " + fmtFecha(llave.venceEn) +
    ". Elegí los artículos que te interesan y enviá tu pedido.";
  mostrar("vistaCatalogo");
  document.getElementById("barraTotal").style.display = "block";
  actualizarTotales();
})();

function mostrar(id) {
  ["vistaCargando", "vistaValidado", "vistaCatalogo"].forEach((v) => {
    document.getElementById(v).style.display = v === id ? "block" : "none";
  });
}

// ================= Catálogo =================
async function cargarCatalogo() {
  const csnap = await getDocs(collection(db, "categorias"));
  cats = [];
  csnap.forEach((d) => cats.push({ id: d.id, ...d.data() }));

  const habilitadas = Array.isArray(llave.categorias) ? llave.categorias : [];
  const visibles = cats.filter((c) =>
    c.activa !== false && (habilitadas.length === 0 || habilitadas.includes(c.id))
  );
  document.getElementById("filtroCat").innerHTML =
    '<option value="">Todas las categorías</option>' +
    visibles.map((c) => `<option value="${c.id}">${c.nombre}</option>`).join("");

  const idsVisibles = visibles.map((c) => c.id);
  const psnap = await getDocs(collection(db, "productos"));
  productos = [];
  psnap.forEach((d) => {
    const p = { id: d.id, ...d.data() };
    if (p.cantidad > 0 && idsVisibles.includes(p.categoriaId)) productos.push(p);
  });
  productos.sort((a, b) => nombreDe(a).localeCompare(nombreDe(b)));
  renderProductos();
}

document.getElementById("filtroCat").addEventListener("change", renderProductos);
document.getElementById("filtroTexto").addEventListener("input", renderProductos);

function renderProductos() {
  const fCat = document.getElementById("filtroCat").value;
  const fTxt = document.getElementById("filtroTexto").value.trim().toLowerCase();
  const cont = document.getElementById("listaProductos");

  const lista = productos.filter((p) =>
    (!fCat || p.categoriaId === fCat) &&
    (!fTxt || nombreDe(p).toLowerCase().includes(fTxt) ||
      (p.descripcion || "").toLowerCase().includes(fTxt))
  );
  if (lista.length === 0) {
    cont.innerHTML = '<p class="texto-suave">No hay artículos para mostrar.</p>';
    return;
  }
  cont.innerHTML = lista.map((p) => {
    const sel = carrito[p.id] || { cantidad: 0, esLote: false, propuesta: "" };
    const foto = (p.fotos && p.fotos[0])
      ? `<img class="prod-foto" src="${p.fotos[0]}">`
      : `<span class="material-icons prod-foto" style="font-size:44px; color:var(--c-borde); text-align:center; line-height:84px;">image</span>`;

    let controles;
    if (sel.esLote) {
      const pl = p.precioLote != null ? p.precioLote : p.precioSugerido * p.cantidad;
      controles = `
        <div class="opcion-lote">
          <strong>Lote completo (${p.cantidad} unidades)</strong><br>
          <span class="texto-suave">Precio del lote: ${fmtMoneda(pl, p.moneda)}</span>
          <label style="margin-top:8px;">Tu propuesta por el lote (opcional)</label>
          <input type="number" inputmode="decimal" class="inpPropuesta" data-id="${p.id}"
                 value="${sel.propuesta || ""}" placeholder="Proponé un precio en ${p.moneda}">
          <button class="btn secundario btnQuitarLote" data-id="${p.id}" style="margin-top:10px;">Quitar lote</button>
        </div>`;
    } else {
      controles = `
        <div class="fila" style="margin-top:10px; justify-content:space-between;">
          <div class="stepper">
            <button class="btnMenos" data-id="${p.id}">−</button>
            <span>${sel.cantidad}</span>
            <button class="btnMas" data-id="${p.id}">+</button>
          </div>
          <button class="btn secundario btnLote" data-id="${p.id}"
                  style="margin-top:0; width:auto; flex:none;">Lote completo</button>
        </div>`;
    }

    const desc = p.nombre && p.descripcion
      ? `<br><span class="texto-suave" style="font-size:13px; white-space:pre-line;">${p.descripcion}</span>` : "";
    return `<div class="card">
      <div class="fila" style="align-items:flex-start;">
        ${foto}
        <div style="flex:1;">
          <strong>${nombreDe(p)}</strong><br>
          <span class="texto-suave">${fmtMoneda(p.precioSugerido, p.moneda)} c/u · ${p.cantidad} disponibles</span>${desc}
        </div>
      </div>
      ${controles}
    </div>`;
  }).join("");

  cont.querySelectorAll(".btnMas").forEach((b) => b.addEventListener("click", () => cambiar(b.dataset.id, 1)));
  cont.querySelectorAll(".btnMenos").forEach((b) => b.addEventListener("click", () => cambiar(b.dataset.id, -1)));
  cont.querySelectorAll(".btnLote").forEach((b) => b.addEventListener("click", () => setLote(b.dataset.id, true)));
  cont.querySelectorAll(".btnQuitarLote").forEach((b) => b.addEventListener("click", () => setLote(b.dataset.id, false)));
  cont.querySelectorAll(".inpPropuesta").forEach((i) => i.addEventListener("input", () => {
    const sel = carrito[i.dataset.id];
    if (sel) { sel.propuesta = i.value; programarGuardado(); actualizarTotales(); }
  }));
}

function cambiar(id, delta) {
  const p = productos.find((x) => x.id === id);
  const sel = carrito[id] || { cantidad: 0, esLote: false, propuesta: "" };
  sel.cantidad = Math.max(0, Math.min(p.cantidad, sel.cantidad + delta));
  sel.esLote = false;
  if (sel.cantidad === 0) delete carrito[id]; else carrito[id] = sel;
  renderProductos();
  actualizarTotales();
  programarGuardado();
}

function setLote(id, activo) {
  if (activo) {
    carrito[id] = { cantidad: 0, esLote: true, propuesta: (carrito[id] && carrito[id].propuesta) || "" };
  } else {
    delete carrito[id];
  }
  renderProductos();
  actualizarTotales();
  programarGuardado();
}

// ================= Totales =================
function calcularItems() {
  const items = [];
  Object.keys(carrito).forEach((id) => {
    const p = productos.find((x) => x.id === id);
    if (!p) return;
    const sel = carrito[id];
    const precioLote = p.precioLote != null ? p.precioLote : p.precioSugerido * p.cantidad;
    items.push({
      productoId: id,
      descripcion: nombreDe(p), // nombre visible en pedidos/ventas (campo histórico)
      moneda: p.moneda,
      precioUnit: p.precioSugerido,
      cantidad: sel.esLote ? p.cantidad : sel.cantidad,
      esLote: !!sel.esLote,
      precioLote: sel.esLote ? precioLote : null,
      propuestaLote: sel.esLote && sel.propuesta !== "" ? Number(sel.propuesta) : null,
      subtotal: sel.esLote ? precioLote : p.precioSugerido * sel.cantidad
    });
  });
  return items;
}

function actualizarTotales() {
  const items = calcularItems();
  const tot = { UYU: 0, USD: 0 };
  let n = 0;
  items.forEach((it) => { tot[it.moneda] = (tot[it.moneda] || 0) + it.subtotal; n++; });
  const partes = [];
  if (tot.UYU > 0) partes.push(fmtMoneda(tot.UYU, "UYU"));
  if (tot.USD > 0) partes.push(fmtMoneda(tot.USD, "USD"));
  document.getElementById("txtTotales").textContent =
    partes.length > 0 ? "Total: " + partes.join(" + ") : "Carrito vacío";
  document.getElementById("txtItems").textContent =
    n > 0 ? n + " artículo(s) seleccionado(s). Las propuestas por lote se acuerdan con el vendedor." : "";
  document.getElementById("btnEnviar").disabled = n === 0;
  document.getElementById("txtEstadoPedido").textContent =
    estadoPedido === "enviado" ? "Tu pedido ya fue enviado. Podés seguir ajustándolo hasta que lo confirmen." : "";
}

// ================= Guardado =================
function programarGuardado() {
  clearTimeout(guardadoTimer);
  guardadoTimer = setTimeout(() => guardar(estadoPedido), 1200);
}

async function guardar(estado) {
  try {
    await setDoc(doc(db, "pedidos", pedidoId), {
      llaveCodigo: codigo,
      nombre: llave.nombre || "",
      telefono: llave.telefono || "",
      items: calcularItems(),
      estado: estado,
      actualizadoEn: serverTimestamp()
    }, { merge: true });
    estadoPedido = estado;
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

document.getElementById("btnEnviar").addEventListener("click", async () => {
  const btn = document.getElementById("btnEnviar");
  btn.disabled = true;
  const ok = await guardar("enviado");
  if (ok) {
    toast("¡Pedido enviado! Te van a contactar para coordinar.", "ok");
    actualizarTotales();
  } else {
    toast("No se pudo enviar. Probá de nuevo.", "error");
  }
  btn.disabled = false;
});
</script>
</body>
</html>
