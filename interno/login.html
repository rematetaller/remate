<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar — remateTaller</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="design-system.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#b45309">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="brand"><span class="material-icons">gavel</span><span>remateTaller</span></div>

    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="username" inputmode="email">

    <label for="pass">Contraseña</label>
    <input type="password" id="pass" autocomplete="current-password">

    <button class="btn" id="btnEntrar">
      <span class="material-icons">login</span> Entrar
    </button>

    <p class="texto-suave centrado" style="margin-top:14px;">
      <a href="#" id="linkOlvide" style="color:var(--c-primario); text-decoration:none;">¿Olvidaste tu contraseña?</a>
    </p>

    <p id="msgError" class="texto-suave centrado" style="color:var(--c-error); display:none; margin-top:14px;"></p>
  </div>

  <!-- ============ Recuperar contraseña ============ -->
  <div class="login-card" id="cardOlvide" style="display:none; margin-top:16px;">
    <h2 style="margin-top:0; font-size:18px;">Recuperar contraseña</h2>
    <p class="texto-suave">Ingresá tu email y te enviamos un link para crear una contraseña nueva.</p>

    <label for="emailRecuperar">Email</label>
    <input type="email" id="emailRecuperar" autocomplete="username" inputmode="email">

    <button class="btn" id="btnEnviarRecuperar">
      <span class="material-icons">mail</span> Enviar link
    </button>
    <button class="btn secundario" id="btnCancelarRecuperar" style="margin-top:8px;">
      Cancelar
    </button>

    <p id="msgRecuperar" class="texto-suave centrado" style="display:none; margin-top:14px;"></p>
  </div>
</div>

<script type="module">
import { auth, signInWithEmailAndPassword } from "./utils.js";
import { onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// Si ya hay sesión, ir directo al panel
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = "panel.html";
});

const btn = document.getElementById("btnEntrar");
const msg = document.getElementById("msgError");

async function entrar() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value;
  if (!email || !pass) {
    mostrarError("Completá email y contraseña.");
    return;
  }
  btn.disabled = true;
  msg.style.display = "none";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = "panel.html";
  } catch (e) {
    console.error(e);
    mostrarError("No se pudo ingresar. Revisá los datos.");
    btn.disabled = false;
  }
}

function mostrarError(t) {
  msg.textContent = t;
  msg.style.display = "block";
}

btn.addEventListener("click", entrar);
document.getElementById("pass").addEventListener("keydown", (e) => {
  if (e.key === "Enter") entrar();
});

// ---------- Recuperar contraseña ----------
const cardOlvide = document.getElementById("cardOlvide");
const msgRecuperar = document.getElementById("msgRecuperar");
const btnEnviarRecuperar = document.getElementById("btnEnviarRecuperar");

document.getElementById("linkOlvide").addEventListener("click", (e) => {
  e.preventDefault();
  msgRecuperar.style.display = "none";
  document.getElementById("emailRecuperar").value = document.getElementById("email").value.trim();
  cardOlvide.style.display = "block";
  cardOlvide.scrollIntoView({ behavior: "smooth" });
});

document.getElementById("btnCancelarRecuperar").addEventListener("click", () => {
  cardOlvide.style.display = "none";
});

async function enviarRecuperar() {
  const email = document.getElementById("emailRecuperar").value.trim();
  if (!email) {
    mostrarMsgRecuperar("Ingresá tu email.", true);
    return;
  }
  btnEnviarRecuperar.disabled = true;
  try {
    await sendPasswordResetEmail(auth, email);
    mostrarMsgRecuperar("Listo. Revisá tu email (y la carpeta de spam) para crear una contraseña nueva.", false);
  } catch (e) {
    console.error(e);
    // No revelamos si el email existe o no, por seguridad.
    mostrarMsgRecuperar("Si el email está registrado, vas a recibir un link para crear una contraseña nueva.", false);
  }
  btnEnviarRecuperar.disabled = false;
}

function mostrarMsgRecuperar(t, esError) {
  msgRecuperar.textContent = t;
  msgRecuperar.style.color = esError ? "var(--c-error)" : "";
  msgRecuperar.style.display = "block";
}

btnEnviarRecuperar.addEventListener("click", enviarRecuperar);
document.getElementById("emailRecuperar").addEventListener("keydown", (e) => {
  if (e.key === "Enter") enviarRecuperar();
});
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>
</body>
</html>
