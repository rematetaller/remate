<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar — remateTaller</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="design-system.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="brand"><span class="material-icons">gavel</span><span>remateTaller</span></div>

    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="username" inputmode="email">

    <label for="pass">Contraseña</label>
    <input type="password" id="pass" autocomplete="current-password">

    <button class="btn" id="btnEntrar">
      <span class="material-icons">login</span> Entrar
    </button>

    <p id="msgError" class="texto-suave centrado" style="color:var(--c-error); display:none; margin-top:14px;"></p>
  </div>
</div>

<script type="module">
import { auth, signInWithEmailAndPassword } from "./utils.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// Si ya hay sesión, ir directo al panel
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = "panel.html";
});

const btn = document.getElementById("btnEntrar");
const msg = document.getElementById("msgError");

async function entrar() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value;
  if (!email || !pass) {
    mostrarError("Completá email y contraseña.");
    return;
  }
  btn.disabled = true;
  msg.style.display = "none";
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = "panel.html";
  } catch (e) {
    console.error(e);
    mostrarError("No se pudo ingresar. Revisá los datos.");
    btn.disabled = false;
  }
}

function mostrarError(t) {
  msg.textContent = t;
  msg.style.display = "block";
}

btn.addEventListener("click", entrar);
document.getElementById("pass").addEventListener("keydown", (e) => {
  if (e.key === "Enter") entrar();
});
</script>
</body>
</html>
