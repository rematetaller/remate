<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>remateTaller</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="design-system.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#b45309">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>

<div class="login-wrap">
  <p class="texto-suave">Verificando sesión…</p>
</div>

<script type="module">
// Router/portero: con sesión válida → panel; sin sesión → login.
// verificarAuth ya valida contra usuarios/{uid} (existe + activo).
import { verificarAuth } from "./utils.js";

verificarAuth(() => {
  window.location.href = "panel.html";
});
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>
</body>
</html>
