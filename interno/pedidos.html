<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos — remateTaller</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="design-system.css">
<style>
.item-fila { border-top:1px solid var(--c-borde); padding:10px 0; }
.item-fila:first-child { border-top:none; }
.inp-mini { width:90px; padding:8px; font-size:15px; }
details summary { cursor:pointer; list-style:none; }
details summary::-webkit-details-marker { display:none; }
</style>
</head>
<body>

<header id="topbar"></header>

<main>
  <h1>Pedidos</h1>
  <div class="fila" style="margin-bottom:10px;">
    <select id="filtroEstado">
      <option value="">Todos</option>
      <option value="enviado" selected>Enviados</option>
      <option value="abierto">Abiertos (sin enviar)</option>
      <option value="validado">Validados</option>
      <option value="descartado">Descartados</option>
    </select>
  </div>
  <div id="lista"><p class="texto-suave">Cargando…</p></div>
</main>

<script type="module">
import {
  verificarAuth, renderNav, db, toast, fmtMoneda, fmtFecha,
  doc, getDoc, updateDoc, setDoc, collection, getDocs, query, orderBy,
  serverTimestamp
} from "./utils.js";

let pedidos = [];
let usuarioActual = null;

verificarAuth(async (user, datos) => {
  usuarioActual = { uid: user.uid, nombre: datos.nombre || "" };
  renderNav("pedidos");
  await cargar();
});

document.getElementById("filtroEstado").addEventListener("change", render);

async function cargar() {
  const snap = await getDocs(query(collection(db, "pedidos"), orderBy("actualizadoEn", "desc")));
  pedidos = [];
  snap.forEach((d) => pedidos.push({ id: d.id, ...d.data() }));
  render();
}

function badgeEstado(e) {
  if (e === "enviado") return '<span class="badge aviso">Enviado</span>';
  if (e === "validado") return '<span class="badge ok">Validado</span>';
  if (e === "descartado") return '<span class="badge error">Descartado</span>';
  return '<span class="badge neutro">Abierto</span>';
}

function precioFinalDefault(it) {
  if (it.precioFinal != null) return it.precioFinal;
  if (it.esLote) return it.propuestaLote != null ? it.propuestaLote : (it.precioLote || 0);
  return (it.precioUnit || 0) * (it.cantidad || 0);
}

function render() {
  const f = document.getElementById("filtroEstado").value;
  const cont = document.getElementById("lista");
  const lista = pedidos.filter((p) => !f || p.estado === f);

  if (lista.length === 0) {
    cont.innerHTML = '<p class="texto-suave">No hay pedidos en este estado.</p>';
    return;
  }

  cont.innerHTML = lista.map((p) => {
    const editable = p.estado === "enviado" || p.estado === "abierto";
    const itemsHtml = (p.items || []).map((it, i) => {
      const pf = precioFinalDefault(it);
      const linea = it.esLote
        ? `<strong>${it.descripcion}</strong> — LOTE COMPLETO (${it.cantidad} u.)` +
          (it.propuestaLote != null
            ? `<br><span class="badge aviso">Propone ${fmtMoneda(it.propuestaLote, it.moneda)}</span> <span class="texto-suave">(lote: ${fmtMoneda(it.precioLote, it.moneda)})</span>`
            : `<br><span class="texto-suave">Precio lote: ${fmtMoneda(it.precioLote, it.moneda)}</span>`)
        : `<strong>${it.descripcion}</strong> — ${it.cantidad} × ${fmtMoneda(it.precioUnit, it.moneda)}`;

      const controles = editable
        ? `<div class="fila" style="margin-top:6px;">
             ${it.esLote ? "" : `<div><label style="margin:0 0 2px; font-size:12px;">Cantidad</label>
               <input type="number" class="inp-mini inpCant" data-p="${p.id}" data-i="${i}" value="${it.cantidad}" min="0"></div>`}
             <div><label style="margin:0 0 2px; font-size:12px;">Precio final (${it.moneda})</label>
               <input type="number" class="inp-mini inpPrecio" data-p="${p.id}" data-i="${i}" value="${pf}" min="0"></div>
             <button class="btn peligro btnQuitarItem" data-p="${p.id}" data-i="${i}"
                     style="margin-top:14px; width:auto; flex:none; padding:8px 12px;">
               <span class="material-icons" style="font-size:18px;">delete</span></button>
           </div>`
        : `<span class="texto-suave">Final: ${fmtMoneda(pf, it.moneda)}</span>`;

      return `<div class="item-fila">${linea}<br>${controles}</div>`;
    }).join("");

    const totales = totalesDe(p);
    const acciones = editable
      ? `<div class="fila" style="margin-top:10px;">
           <button class="btn secundario btnGuardarCambios" data-p="${p.id}">
             <span class="material-icons">save</span> Guardar</button>
           <button class="btn btnValidar" data-p="${p.id}">
             <span class="material-icons">check_circle</span> Validar venta</button>
         </div>
         <button class="btn peligro btnDescartar" data-p="${p.id}">
           <span class="material-icons">block</span> Descartar pedido</button>`
      : "";

    return `<div class="card">
      <details ${p.estado === "enviado" ? "open" : ""}>
        <summary>
          <div class="fila" style="justify-content:space-between;">
            <strong>${p.nombre || "—"}</strong> ${badgeEstado(p.estado)}
          </div>
          <span class="texto-suave">Llave ${p.llaveCodigo || "—"} · Tel: ${p.telefono || "—"} ·
          ${fmtFecha(p.actualizadoEn)} · ${(p.items || []).length} ítem(s) · ${totales}</span>
        </summary>
        ${itemsHtml || '<p class="texto-suave">Sin ítems.</p>'}
        ${acciones}
      </details>
    </div>`;
  }).join("");

  enganchar(cont);
}

function totalesDe(p) {
  const tot = { UYU: 0, USD: 0 };
  (p.items || []).forEach((it) => {
    tot[it.moneda] = (tot[it.moneda] || 0) + Number(precioFinalDefault(it) || 0);
  });
  const partes = [];
  if (tot.UYU > 0) partes.push(fmtMoneda(tot.UYU, "UYU"));
  if (tot.USD > 0) partes.push(fmtMoneda(tot.USD, "USD"));
  return partes.length > 0 ? partes.join(" + ") : "—";
}

function leerEdicion(pedidoId) {
  const p = pedidos.find((x) => x.id === pedidoId);
  const items = (p.items || []).map((it) => Object.assign({}, it));
  document.querySelectorAll(`.inpCant[data-p="${pedidoId}"]`).forEach((inp) => {
    items[Number(inp.dataset.i)].cantidad = Number(inp.value) || 0;
  });
  document.querySelectorAll(`.inpPrecio[data-p="${pedidoId}"]`).forEach((inp) => {
    items[Number(inp.dataset.i)].precioFinal = Number(inp.value) || 0;
  });
  return items.filter((it) => it.esLote || it.cantidad > 0);
}

function enganchar(cont) {
  cont.querySelectorAll(".btnQuitarItem").forEach((b) => {
    b.addEventListener("click", async () => {
      const p = pedidos.find((x) => x.id === b.dataset.p);
      const items = leerEdicion(b.dataset.p);
      items.splice(Number(b.dataset.i), 1);
      await updateDoc(doc(db, "pedidos", p.id), { items, actualizadoEn: serverTimestamp() });
      toast("Ítem quitado.", "ok");
      cargar();
    });
  });

  cont.querySelectorAll(".btnGuardarCambios").forEach((b) => {
    b.addEventListener("click", async () => {
      const items = leerEdicion(b.dataset.p);
      await updateDoc(doc(db, "pedidos", b.dataset.p), { items, actualizadoEn: serverTimestamp() });
      toast("Cambios guardados.", "ok");
      cargar();
    });
  });

  cont.querySelectorAll(".btnDescartar").forEach((b) => {
    b.addEventListener("click", async () => {
      if (!confirm("¿Descartar este pedido?")) return;
      await updateDoc(doc(db, "pedidos", b.dataset.p), {
        estado: "descartado", gestionadoPor: usuarioActual.uid, actualizadoEn: serverTimestamp()
      });
      toast("Pedido descartado.", "ok");
      cargar();
    });
  });

  cont.querySelectorAll(".btnValidar").forEach((b) => {
    b.addEventListener("click", () => validar(b.dataset.p));
  });
}

// ============ Validar venta ============
async function validar(pedidoId) {
  const p = pedidos.find((x) => x.id === pedidoId);
  const items = leerEdicion(pedidoId);
  if (items.length === 0) { toast("El pedido no tiene ítems.", "error"); return; }

  const tot = { UYU: 0, USD: 0 };
  items.forEach((it) => {
    it.precioFinal = it.precioFinal != null ? it.precioFinal : precioFinalDefault(it);
    tot[it.moneda] = (tot[it.moneda] || 0) + Number(it.precioFinal || 0);
  });

  const resumen = items.map((it) =>
    "· " + it.descripcion + (it.esLote ? " (LOTE)" : " ×" + it.cantidad) +
    " = " + fmtMoneda(it.precioFinal, it.moneda)).join("\n");
  if (!confirm("Confirmar venta a " + (p.nombre || "—") + ":\n\n" + resumen +
    "\n\nSe descuenta el stock y queda registrada. ¿Validar?")) return;

  try {
    // 1) Registro inmutable en ventas (ID determinístico = idempotente)
    await setDoc(doc(db, "ventas", "venta-" + pedidoId), {
      fecha: serverTimestamp(),
      llaveCodigo: p.llaveCodigo || "",
      comprador: { nombre: p.nombre || "", telefono: p.telefono || "" },
      vendedorUid: usuarioActual.uid,
      vendedorNombre: usuarioActual.nombre,
      items: items.map((it) => ({
        productoId: it.productoId,
        descripcion: it.descripcion,
        cantidad: it.cantidad,
        esLote: !!it.esLote,
        moneda: it.moneda,
        precioFinal: Number(it.precioFinal || 0)
      })),
      totales: { UYU: tot.UYU || 0, USD: tot.USD || 0 }
    });

    // 2) Descontar stock
    for (const it of items) {
      try {
        const ref = doc(db, "productos", it.productoId);
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const actual = Number(snap.data().cantidad || 0);
          const nueva = it.esLote ? 0 : Math.max(0, actual - Number(it.cantidad || 0));
          await updateDoc(ref, {
            cantidad: nueva,
            estado: nueva > 0 ? "disponible" : "agotado",
            actualizadoEn: serverTimestamp()
          });
        }
      } catch (e) { console.error("Stock:", e); }
    }

    // 3) Cerrar el pedido
    await updateDoc(doc(db, "pedidos", pedidoId), {
      items, estado: "validado",
      gestionadoPor: usuarioActual.uid, actualizadoEn: serverTimestamp()
    });

    toast("Venta registrada ✅", "ok");
    cargar();
  } catch (e) {
    console.error(e);
    toast("Error validando la venta.", "error");
  }
}
</script>
</body>
</html>
